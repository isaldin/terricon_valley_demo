<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore — Магазин электроники</title>

    <!-- Preload LCP-картинки hero-слайдера -->
    <link rel="preload" href="/images/hero/hero-1.jpg" as="image">

    <!-- Шрифт с font-display: swap — текст виден сразу, шрифт подменяется -->
    <link rel="stylesheet" href="/fonts/inter/inter.css">

    <!-- Leaflet CSS — нужен для карты внизу страницы -->
    <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />

    <!-- Leaflet JS — defer вместо blocking, не блокирует парсинг HTML -->
    <script defer src="/vendor/leaflet/leaflet.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
