<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore — Магазин электроники</title>

    <!-- Inline critical CSS — рендерится без ожидания внешних стилей -->
    <style>
      :root{--color-primary:#2563eb;--color-white:#fff;--color-gray-700:#334155;--header-height:64px;--container-max:1280px;--container-padding:1rem;--shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);--font-size-xl:1.25rem;--spacing-lg:1.5rem;--transition-fast:150ms ease}
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#0f172a}
      .header{position:fixed;top:0;left:0;right:0;height:var(--header-height);background:var(--color-white);box-shadow:var(--shadow-md);z-index:100}
      .header-inner{max-width:var(--container-max);margin:0 auto;padding:0 var(--container-padding);height:100%;display:flex;align-items:center;justify-content:space-between}
      .hero-slider{position:relative;height:500px;overflow:hidden}
      @font-face{font-family:'Inter';font-style:normal;font-weight:400 700;font-display:swap;src:url('/fonts/inter/inter-cyrillic.woff2') format('woff2');unicode-range:U+0301,U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116}
      @font-face{font-family:'Inter';font-style:normal;font-weight:400 700;font-display:swap;src:url('/fonts/inter/inter-latin.woff2') format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}
    </style>

    <!-- Preload LCP-картинки hero-слайдера -->
    <link rel="preload" href="/images/hero/hero-1.jpg" as="image">

    <!-- Leaflet CSS — нужен для карты внизу страницы -->
    <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />

    <!-- Leaflet JS — defer вместо blocking, не блокирует парсинг HTML -->
    <script defer src="/vendor/leaflet/leaflet.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
